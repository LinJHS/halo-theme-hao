<!-- loading页面 -->
<th:block th:if="${theme.config.other.loadingBoxs.loadingBoxEnable}">
    <style type="text/css">
        #loading-box {
            -webkit-user-select: none;
        }

        #loading-box .loading-bg {
            display: flex;
            width: 100%;
            height: 100%;
            position: fixed;
            background: var(--heo-card-bg);
            z-index: 1999;
            opacity: 1;
            transition: 0.2s;
            pointer-events: all;
            animation: showLoading 0.3s 0s backwards;
        }

        #loading-box.loaded .loading-bg {
            pointer-events: none;
            transition: 0.2s;
            animation: hideLoading 0.3s 0s forwards;
        }

        /* 页面加载动画元素容器 */
        #loading-box .spinner {
            width: 50px;
            height: 50px;
            margin: auto;
            position: relative;
        }

        /* 两个交错缩放的圆形 */
        #loading-box .spinner .bounce1,
        #loading-box .spinner .bounce2 {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--heo-main, #6bdf8f);
            opacity: 0.6;
            position: absolute;
            top: 0;
            left: 0;
            animation: bounce 2s infinite ease-in-out;
        }

        /* 第二个圆形延迟产生交错效果 */
        #loading-box .spinner .bounce2 {
            animation-delay: -1.0s;
        }

        /* 缩放动画关键帧 */
        @keyframes bounce {

            0%,
            100% {
                transform: scale(0);
            }

            50% {
                transform: scale(1);
            }
        }

        @keyframes hideLoading {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes showLoading {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
    <!-- 页面加载动画外层容器 -->
    <div id="loading-box" onclick="heo.hideLoading()">
        <div class="loading-bg">
            <div class="spinner">
                <div class="bounce1"></div>
                <div class="bounce2"></div>
            </div>
        </div>
    </div>
    <script>
        var preloader = {
            endLoading: () => {
                //- document.body.style.overflow = 'auto';
                document.getElementById('loading-box').classList.add("loaded")
            },
            initLoading: () => {
                //- document.body.style.overflow = '';
                document.getElementById('loading-box').classList.remove("loaded")
            }
        }
        window.addEventListener('load', preloader.endLoading())
        setTimeout(function () {
            preloader.endLoading();
        }, 3000)
    </script>

</th:block>
