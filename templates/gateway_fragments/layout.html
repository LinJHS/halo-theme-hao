<!doctype html>
<html th:lang="${#locale.toLanguageTag}" th:fragment="layout (title,head,body)"
  th:with="assets_link=${theme.config.other.staticResource.use == 'custom' ? theme.config.other.staticResource.cdn_link : #theme.assets('/')},
               isLazyload=${theme.config.other.vanillaLazyload.enable != null ? theme.config.other.vanillaLazyload.enable : false}">

<head>
  <meta charset="UTF-8" />
  <meta content="IE=edge" http-equiv="X-UA-Compatible" />
  <meta content="webkit" name="renderer" />
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    name="viewport" />
  <meta content="noindex,nofollow" name="robots" />
  <title th:text="${title}"></title>
  <link rel="preload" href="/images/wordmark.svg" as="image" type="image/svg+xml" />
  <link rel="preload" href="/images/logo.png" as="image" type="image/png" />
  <link rel="stylesheet" th:href="${assets_link + '/zhheo/zhheoblog.css'}">

  <th:block th:replace="~{gateway_fragments/common::basicStaticResources}"></th:block>

  <th:block th:if="${head != null}">
    <th:block th:replace="${head}" />
  </th:block>

  <style>
    .auth-agreement {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: var(--color-text);
      opacity: 0.8;
    }

    .auth-agreement a {
      color: var(--color-primary);
      text-decoration: none;
      transition: 0.3s;
    }

    .auth-agreement a:hover {
      color: var(--color-primary-hover, #0056b3);
    }

    .gateway-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--heo-background);
    }

    .gateway-wrapper {
      flex: 1;
      max-width: 40rem;
      margin: 0 auto;
      /* 确保表单主体居中呈现 */
      width: 100%;
    }

    /* 页面底部简易页脚 */
    .gateway-footer {
      text-align: center;
      padding: 20px 0;
      font-size: 12px;
      color: var(--heo-secondtext, #888);
      margin-top: auto;
    }

    .gateway-footer a {
      color: inherit;
      text-decoration: none;
      transition: 0.3s;
    }

    .gateway-footer a:hover {
      color: var(--heo-main, #333);
    }
  </style>
</head>

<body class="gateway-page">
  <div class="gateway-wrapper">
    <th:block th:replace="${body}" />

    <!-- 用户协议与隐私条款 -->
    <div class="auth-agreement" id="auth-agreement" style="display: none;">
      登录或注册即充分理解并同意
      <a href="/terms" target="_blank">《用户协议》</a>
      和
      <a href="/privacy" target="_blank">《隐私条款》</a>
    </div>

    <!-- 利用原生 JS 在组件挂载后，自动将协议提示符挪动到按钮下方以维持页面原有 DOM 结构安全 -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var submitBtn = document.querySelector('form button[type="submit"]');
        var agreement = document.getElementById('auth-agreement');
        if (submitBtn && agreement) {
          var formItem = submitBtn.closest('.form-item');
          if (formItem) {
            formItem.parentNode.insertBefore(agreement, formItem.nextSibling);
          } else {
            submitBtn.parentNode.insertBefore(agreement, submitBtn.nextSibling);
          }
          // 移动完成后再显示，避免页面闪烁
          agreement.style.display = 'block';
        }
      });
    </script>
  </div>

  <!-- 网关专属纯净页脚 -->
  <footer class="gateway-footer">
    [[${site.title}]] & 丘原科技 &copy;
    <th:block th:if="${not #strings.isEmpty(theme.config.basics.siteStartTime)}">
      [[${#strings.arraySplit(theme.config.basics.siteStartTime, '-')[0]}]]-<!--
 --></th:block><!--
 -->[[${#dates.format(new java.util.Date(), 'yyyy')}]] All Rights Reserved |
    <a href="https://beian.miit.gov.cn/" target="_blank" th:if="${not #strings.isEmpty(theme.config.basics.icp)}"
      th:text="${theme.config.basics.icp}"></a>
    <a href="http://www.beian.gov.cn/" target="_blank" th:if="${not #strings.isEmpty(theme.config.basics.gongan)}"
      th:text="' ' + ${theme.config.basics.gongan}"></a>
  </footer>

</body>

</html>
